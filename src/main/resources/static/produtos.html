<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Produtos - Empório Pito de Pango</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>

        <header class="topo">
            <div class="logo-area">
                <img src="img/LogoPitodePango.png" alt="Logo">
                <strong>Empório Pito de Pango</strong>
            </div>

            <nav>
                <a href="index.html">Início</a>
                <a href="produtos.html">Produtos</a>
                <a href="produto.html">Produto</a>
                <a href="carrinho.html">Carrinho</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
            </nav>

            <div class="carrinho">🛒 <span id="contadorCarrinho">0</span></div>
        </header>

        <main class="secao">
            <h1>Catálogo de Produtos</h1>

            <div class="filtros">
                <input type="text" id="buscaProduto" placeholder="Buscar produto...">

                <select id="filtroCategoria">
                    <option value="todos">Todas as categorias</option>
                    <option value="cafe-sem">Grãos sem terpenos</option>
                    <option value="cafe-com">Grãos com terpenos</option>
                    <option value="salgados">Salgados</option>
                    <option value="chocolate">Chocolate em barra</option>
                    <option value="filtros">Filtros e passadores</option>
                    <option value="isqueiros">Isqueiros/Maçaricos</option>
                    <option value="sedas">Sedas</option>
                    <option value="blunts">Blunts</option>
                    <option value="piteiras">Piteiras</option>
                    <option value="dichavador">Dichavador</option>
                </select>
            </div>

            <div class="produtos-grid" id="listaProdutos"></div>
        </main>

        <footer>
            <img src="img/LogoPitodePango.png" alt="Logo">
            <p>Empório Pito de Pango — Seu café, sua vibe, seu ritual.</p>
            <p>© 2026 Todos os direitos reservados.</p>
        </footer>

        <script src="js/produtos.js"></script>
    </body>
</html>
